title: Windows Event Log Cleared  
id: a62b2c23-9e85-4e8d-9f3a-7b2c1a4d6e3f
status: Production
description: Detects the clearing of Windows Event Logs. Event ID 1102 is generated when the Security audit log is cleared. Event ID 104 is generated when the System log is cleared via Event Viewer. Attackers clear logs toremove forensic evidence of malicious activity after an intrusion.This is a high-fidelity detection, legitimate clearing is rare andshould always be investigated.
author: Misbah Ur Rehman
date: 2026-05-24
references: 
  - https://attack.mitre.org/techniques/T1685/005/
  - https://docs.microsoft.com/en-us/windows/security/threat-protection/auditing/event-1102
  - https://www.ultimatewindowssecurity.com/securitylog/encyclopedia/event.aspx?eventID=1102
tags:
  - attack.t1685.005
  - attack.defense_evasion
  - attack.t1070.001
logsource:
logsource:
  product: windows
  category: security
detection:
  selection:
    EventID:
      - 1102 #(Security log cleared)
      - 104  #(System log cleared via Event Viewer)
  condition: selection
falsepositives:
  - Legitimate log clearing by administrators or automated maintenance tasks. However, this is uncommon and should be investigated.
  - Scheduled log rotation by a documented admin script
  - IT maintenance with prior change ticket
  - Some backup or endpoint management tools (verify against CMDB)
level: critical

